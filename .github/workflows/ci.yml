name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Scan for obvious hardcoded secrets
        run: npm run secrets:scan

      - name: Check tracked local/generated files
        run: npm run tracked:check

      - name: Audit web dependencies
        run: npm --prefix web audit --audit-level=moderate

  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "api[dev]"

      - name: Audit API dependencies
        run: pip-audit --skip-editable --cache-dir api/.pip-audit-cache --progress-spinner=off

      - name: Lint API
        run: python -m ruff check api

      - name: Test API
        run: |
          set -o pipefail
          python -m pytest api \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:api/coverage.xml \
            | tee api/test-report.txt

      - name: Add API test summary
        if: always()
        run: |
          echo "## API checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ruff lint: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pytest: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage XML: api/coverage.xml" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -n 45 api/test-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload API coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: api-coverage
          path: |
            api/coverage.xml
            api/test-report.txt
          if-no-files-found: error

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Lint web
        run: npm run lint

      - name: Test web
        run: |
          set -o pipefail
          npm run web:test:coverage | tee web/test-report.txt

      - name: Build web
        run: npm run build

      - name: Add web test summary
        if: always()
        run: |
          echo "## Web checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- ESLint: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vitest coverage: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vite build: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage report: web/coverage/" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          tail -n 35 web/test-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload web coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: web-coverage
          path: |
            web/coverage
            web/test-report.txt
          if-no-files-found: error
