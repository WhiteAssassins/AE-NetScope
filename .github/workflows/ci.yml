name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Validate release metadata
        run: npm run release:check

      - name: Validate Compose file
        run: docker compose config --quiet

      - name: Validate shell scripts
        run: bash -n docker/entrypoint.sh

  security:
    name: Security checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Scan for obvious hardcoded secrets
        run: npm run secrets:scan

      - name: Check tracked local/generated files
        run: npm run tracked:check

      - name: Audit web dependencies
        run: npm --prefix web audit --audit-level=moderate

  api:
    name: API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: ae_netscope_ci
          POSTGRES_USER: ae_netscope_ci
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ae_netscope_ci -d ae_netscope_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "api[dev]"

      - name: Audit API dependencies
        run: pip-audit --skip-editable --cache-dir api/.pip-audit-cache --progress-spinner=off

      - name: Lint API
        run: python -m ruff check api

      - name: Check SQLite migrations
        run: |
          mkdir -p api/var
          cd api
          DATABASE_URL=sqlite+aiosqlite:///./var/ci-alembic-check.db python -m alembic upgrade head
          DATABASE_URL=sqlite+aiosqlite:///./var/ci-alembic-check.db python -m alembic check

      - name: Check PostgreSQL migrations
        env:
          DATABASE_URL: postgresql+asyncpg://ae_netscope_ci:ci-only-password@127.0.0.1:5432/ae_netscope_ci
        run: |
          cd api
          python -m alembic upgrade head
          python -m alembic current --check-heads
          python -m alembic check

      - name: Test API
        run: |
          set -o pipefail
          mkdir -p api/test-results
          python -m pytest api \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:api/coverage.xml \
            --junitxml=api/test-results/pytest-junit.xml \
            | tee api/test-report.txt

      - name: Add API test summary
        if: always()
        run: |
          echo "## API checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ruff lint: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pytest: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage XML: api/coverage.xml" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          if [ -f api/test-report.txt ]; then
            tail -n 45 api/test-report.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "api/test-report.txt was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload API coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: api-coverage
          path: |
            api/coverage.xml
            api/test-report.txt
            api/test-results
          if-no-files-found: warn

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Lint web
        run: npm run lint

      - name: Test web
        run: |
          set -o pipefail
          mkdir -p web/test-results
          npm --prefix web run test:coverage -- --reporter=default --reporter=junit --outputFile=test-results/vitest-junit.xml | tee web/test-report.txt

      - name: Build web
        run: npm run build

      - name: Add web test summary
        if: always()
        run: |
          echo "## Web checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- ESLint: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vitest coverage: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Vite build: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage report: web/coverage/" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          if [ -f web/test-report.txt ]; then
            tail -n 35 web/test-report.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "web/test-report.txt was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload web coverage report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: web-coverage
          path: |
            web/coverage
            web/test-report.txt
            web/test-results
          if-no-files-found: warn

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - metadata
      - api
      - web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image without publishing
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          platforms: linux/amd64
          build-args: |
            VITE_API_BASE_URL=/api
