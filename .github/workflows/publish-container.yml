name: Publish container

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.1.4-alpha
        required: true
      prerelease:
        description: Publish as prerelease channel
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/whiteassassins/ae-netscope
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
  IS_PRERELEASE: ${{ github.event.release.prerelease || inputs.prerelease }}

jobs:
  publish:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=raw,value=alpha,enable=${{ env.IS_PRERELEASE == 'true' }}
            type=raw,value=latest,enable=${{ env.IS_PRERELEASE != 'true' }}
          labels: |
            org.opencontainers.image.title=AE NetScope
            org.opencontainers.image.description=Source-available LAN inventory and sysadmin network documentation web app.
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ env.RELEASE_TAG }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=/api
