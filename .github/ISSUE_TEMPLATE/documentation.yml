name: Documentation
description: Report missing, unclear, or incorrect documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        AE NetScope is source-available proprietary software. Documentation suggestions are handled under the repository license.
  - type: textarea
    id: location
    attributes:
      label: Documentation location
      description: Link or file path.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What should change?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested wording or fix
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: Any examples are fictional and do not expose real infrastructure details.
          required: true
