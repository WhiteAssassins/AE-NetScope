name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the workflow, not private infrastructure.
        Use fictional examples only.
        AE NetScope is source-available proprietary software. Contributions and suggestions are handled under the repository license.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should AE NetScope do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Devices
        - IPs and MACs
        - Subnets
        - VLANs
        - Services
        - Hardware
        - Authentication
        - Deployment
        - Other
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: This request does not include sensitive network data, secrets, credentials, or private infrastructure details.
          required: true
